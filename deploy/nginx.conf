# =========================
# HTTP → HTTPS redirect
# =========================
server {
    listen 80;
    server_name whatsthepayout.com.com www.whatsthepayout.com.com;
    return 301 https://$host$request_uri;
}

# =========================
# HTTPS
# =========================
server {
    listen 443 ssl http2;
    server_name whatsthepayout.com.com www.whatsthepayout.com.com;

    ssl_certificate     /etc/letsencrypt/live/whatsthepayout.com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsthepayout.com.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API
    location /api/ {
        proxy_pass http://localhost:4005;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:4005;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main app
    location / {
        proxy_pass http://localhost:4005;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/compas_access.log;
    error_log  /var/log/nginx/compas_error.log;
}