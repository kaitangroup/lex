# Nginx config for whatsthepayout.com
# Place at: /etc/nginx/sites-available/hiddensix
# Then: sudo ln -s /etc/nginx/sites-available/hiddensix /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name whatsthepayout.com www.whatsthepayout.com;

    # Redirect HTTP → HTTPS (after SSL is set up)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name whatsthepayout.com www.whatsthepayout.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/whatsthepayout.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsthepayout.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # PWA service worker — no cache
    location = /sw.js {
        proxy_pass http://localhost:4004;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # PWA manifest — short cache
    location = /manifest.json {
        proxy_pass http://localhost:4004;
        add_header Cache-Control "public, max-age=3600";
    }

    # API routes — proxy to Node
    location /api/ {
        proxy_pass         http://localhost:4004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # All other routes — proxy to Node (SPA + static assets)
    location / {
        proxy_pass         http://localhost:4004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:4004;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/hiddensix_access.log;
    error_log  /var/log/nginx/hiddensix_error.log;
}
